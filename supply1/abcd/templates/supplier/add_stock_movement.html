{% extends 'supplier/base.html' %}

{% block title %}Add Stock Movement{% endblock %}

{% block content %}
<div class="bg-white p-6 rounded-lg shadow-md max-w-lg mx-auto">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Add Stock Movement</h2>

    {% if products %}
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="product" class="block text-sm font-medium text-gray-700 mb-1">Product</label>
                <select id="product" name="product" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    {% for product in products %}
                        <option value="{{ product.id }}">{{ product.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="movement_type" class="block text-sm font-medium text-gray-700 mb-1">Movement Type</label>
                <select id="movement_type" name="movement_type" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="in">Stock In</option>
                    <option value="out">Stock Out</option>
                    <option value="adjust">Adjust</option>
                </select>
            </div>

            <div>
                <label for="quantity" class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                <input type="number" id="quantity" name="quantity" required min="0" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="reason" class="block text-sm font-medium text-gray-700 mb-1">Reason (Optional)</label>
                <textarea id="reason" name="reason" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" rows="4"></textarea>
            </div>

            <div class="flex space-x-4">
                <button type="submit" class="flex-1 bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 transition duration-200">Submit</button>
                <a href="{% url 'supplier_dashboard' %}" class="flex-1 bg-gray-300 text-gray-800 py-2 rounded-md hover:bg-gray-400 text-center">Cancel</a>
            </div>
        </form>
    {% else %}
        <div class="text-center py-8 text-gray-500">
            <p>No products available to manage stock.</p>
            <a href="{% url 'supplier_dashboard' %}" class="text-blue-500 hover:underline">Back to Dashboard</a>
        </div>
    {% endif %}
</div>
{% endblock %}
