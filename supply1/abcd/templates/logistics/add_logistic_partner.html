<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistic Partner Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-lg">
        <form method="POST" action="{% url 'add_logistic_partner' %}" onsubmit="return validateForm()">
            {% csrf_token %}
            <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Logistic Partner Register</h2>

            {% if messages %}
                <div class="mb-4 space-y-2">
                    {% for message in messages %}
                        <div class="bg-{% if message.tags == 'success' %}green{% else %}red{% endif %}-100 border border-{% if message.tags == 'success' %}green{% else %}red{% endif %}-400 text-{% if message.tags == 'success' %}green{% else %}red{% endif %}-700 px-4 py-2 rounded flex justify-between items-center">
                            <span>{{ message }}</span>
                            <button type="button" onclick="this.parentElement.remove()" class="text-sm hover:underline">Dismiss</button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <div class="mb-4">
                <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" id="full_name" name="full_name" required pattern="^[A-Za-z\s]+$" title="Only letters and spaces allowed" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-4">
                <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <input type="tel" id="phone" name="phone" required pattern="^\d{10}$" title="Enter a 10-digit phone number" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-4">
                <label for="place" class="block text-sm font-medium text-gray-700 mb-1">Place</label>
                <input type="text" id="place" name="place" required pattern="^[A-Za-z\s]+$" title="Only letters and spaces allowed" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-6">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required title="Minimum 8 characters with 1 uppercase, 1 lowercase, and 1 special character" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 transition duration-200">Register</button>

            <p class="mt-4 text-center text-sm text-gray-600">
                Already have an account? <a href="{% url 'user_login' %}" class="text-blue-500 hover:underline">Log In</a>
            </p>
        </form>
    </div>

    <script>
        function validateForm() {
            const fullName = document.getElementById('full_name').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,}$/;

            if (!/^[A-Za-z\s]+$/.test(fullName)) {
                alert("Full name must only contain letters and spaces.");
                return false;
            }

            if (!/^\d{10}$/.test(phone)) {
                alert("Phone number must be exactly 10 digits.");
                return false;
            }

            if (!passwordRegex.test(password)) {
                alert("Password must be at least 8 characters with 1 uppercase, 1 lowercase, and 1 special character.");
                return false;
            }

            return true;
        }
    </script>
</body>
</html>
