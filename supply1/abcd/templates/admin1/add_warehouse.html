{% extends 'admin1/base.html' %}
{% block content %}
<style>
    .form-container {
        max-width: 500px;
        margin: 50px auto;
        padding: 30px;
        background-color: #fff;
        border-radius: 10px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
        color: #555;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
    }

    .form-group input:focus {
        border-color: #007BFF;
        outline: none;
    }

    .submit-btn {
        width: 100%;
        padding: 12px;
        background: #007BFF;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
    }

    .submit-btn:hover {
        background: #0056b3;
    }

    .message {
        margin-bottom: 15px;
        text-align: center;
    }

    .message.success {
        color: green;
    }

    .message.error {
        color: red;
    }
</style>

<div class="form-container">
    <h2>Add Warehouse</h2>

    {% if messages %}
        <div class="message">
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Warehouse Name</label>
            <input type="text" name="name" id="name" required>
        </div>

        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" name="location" id="location" required>
        </div>

        <button type="submit" class="submit-btn">Add Warehouse</button>
    </form>
</div>
{% endblock %}
