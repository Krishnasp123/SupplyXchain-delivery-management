{% extends 'admin1/base.html' %}
{% block content %}
<style>
    .form-container {
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        width: 400px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .form-container h2 {
        text-align: center;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
    }
    .form-group input {
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    .form-group input:focus {
        border-color: #007bff;
        outline: none;
    }
    .submit-btn {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    .submit-btn:hover {
        background-color: #0056b3;
    }
</style>

<div class="form-container">
    <h2>Edit Supplier</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="full_name" value="{{ supplier.full_name }}" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ supplier.email }}" required>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ supplier.contact_no }}" required>
        </div>
        <div class="form-group">
            <label>New Password (leave blank to keep existing)</label>
            <input type="password" name="password">
        </div>
        <button type="submit" class="submit-btn">Update Supplier</button>
    </form>
</div>
{% endblock %}
